global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 2048

defaults
    log global
    option dontlognull
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend http_frontend
    mode http
    option httplog
    bind 10.30.30.2:80
    default_backend web_servers

backend web_servers
    mode http
    balance roundrobin
    option httpchk GET /
    server server1 10.20.20.11:80 check
    server server2 10.20.20.12:80 check

frontend iperf_frontend
    mode tcp
    option tcplog
    bind 10.30.30.2:5201
    default_backend iperf_servers

backend iperf_servers
    mode tcp
    balance source
    server server1 10.20.20.11:5201
    server server2 10.20.20.12:5201